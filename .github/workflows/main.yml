name: Continuous Integration

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "Casks/**"
  workflow_dispatch:
  schedule:
    # Run every Saturday at 1:30 AM UTC
    - cron: "30 1 * * 6"

jobs:
  detect_casks:
    name: Detect Casks to test
    runs-on: ubuntu-24.04
    outputs:
      casks: ${{ steps.detect.outputs.casks }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect Casks to test
        id: detect
        run: |
          case "${{ github.event_name }}" in
          "pull_request")
            # For pull requests, check against the base branch
            changed=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep '^Casks/.*\.rb$' || true)

            # if workflows were changed test all casks
            if [[ $(git diff --name-only origin/${{ github.base_ref }} HEAD | grep '^\.github/workflows/.*\.yml$' || true) ]]; then
              echo "Workflows changed, testing all casks."
              changed=$(find Casks -name '*.rb' || true)
            fi
            ;;
          *)
            # By default, include all Casks
            changed=$(find Casks -name '*.rb' || true)
            ;;
          esac

          if [[ -z "$changed" ]]; then
            echo "No cask changes detected."
            echo "casks=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Convert filenames to just cask tokens (strip path & extension)
          tokens=$(echo "$changed" | sed -E 's|^Casks/||; s|\.rb$||')
          json=$(printf '%s\n' "$tokens" | jq -R . | jq -s -c .)

          echo "Detected casks: $json"
          echo "casks=$json" >> $GITHUB_OUTPUT

  audit_casks:
    name: "Audit casks"
    needs: detect_casks
    if: ${{ needs.detect_casks.outputs.casks != '[]' && needs.detect_casks.outputs.casks != '' }}
    runs-on: macos-15
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # main
        with:
          stable: true
          test-bot: false
      - name: Cache Homebrew Gems
        id: cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: macos-15-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: macos-15-rubygems-
      - name: Install Homebrew Gems
        id: gems
        run: brew install-bundler-gems
        if: steps.cache.outputs.cache-hit != 'true'
      - name: Trust fasmat/trader-workstation tap
        run: brew trust fasmat/trader-workstation
      - name: Style check cask
        run: brew style --casks ${{ join(fromJson(needs.detect_casks.outputs.casks), ' ') }}
      - name: Audit cask
        run: brew audit --casks --online --strict --skip-style ${{ join(fromJson(needs.detect_casks.outputs.casks), ' ') }}

  test_casks:
    name: "${{ matrix.os }}: Test ${{ matrix.cask }}"
    needs: detect_casks
    if: ${{ needs.detect_casks.outputs.casks != '[]' && needs.detect_casks.outputs.casks != '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        cask: ${{ fromJson(needs.detect_casks.outputs.casks) }}
        os:
          - macos-14
          - macos-15
          - macos-15-intel
          - macos-26
          - macos-26-intel
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # main
        with:
          stable: true
          test-bot: false
      - name: Cache Homebrew Gems
        id: cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-
      - name: Install Homebrew Gems
        id: gems
        run: brew install-bundler-gems
        if: steps.cache.outputs.cache-hit != 'true'
      - name: Trust fasmat/trader-workstation tap
        run: brew trust fasmat/trader-workstation
      - name: Install cask
        run: brew install --cask "${{ matrix.cask }}"
      - name: Start Trader Workstation
        if: startsWith(matrix.cask, 'trader-workstation')
        run: |
          # Find application
          app_path="$(find /Applications -maxdepth 3 -type d -name "Trader Workstation*.app" | grep -v "Uninstaller" | head -n 1)"
          if [[ -z "$app_path" ]]; then
            app_path="$(find "$HOME/Applications" -maxdepth 3 -type d -name "Trader Workstation*.app" | grep -v "Uninstaller" | head -n 1)"
          fi
          if [[ -z "$app_path" ]]; then
            echo "Trader Workstation application not found."
            exit 1
          fi

          # Start Trader Workstation in the background
          echo "Starting Trader Workstation from $app_path"
          open "$app_path"
          # Wait for a few seconds to allow the application to start, then verify it's running
          sleep 10
          pgrep -f "Trader Workstation" > /dev/null || { echo "Trader Workstation did not start."; exit 1; }
      - name: Start IBKR Desktop
        if: startsWith(matrix.cask, 'ibkr-desktop')
        run: |
          # Find application
          app_path="$(find /Applications -maxdepth 2 -type d -name "IBKR*.app" | grep -v "Uninstaller" | head -n 1)"
          if [[ -z "$app_path" ]]; then
            app_path="$(find "$HOME/Applications" -maxdepth 2 -type d -name "IBKR*.app" | grep -v "Uninstaller" | head -n 1)"
          fi
          if [[ -z "$app_path" ]]; then
            echo "IBKR Desktop application not found."
            exit 1
          fi

          # Start IBKR Desktop in the background
          echo "Starting IBKR Desktop from $app_path"
          open "$app_path"
          # Wait for a few seconds to allow the application to start, then verify it's running
          sleep 10
          pgrep -f "IBKR" > /dev/null || { echo "IBKR Desktop did not start."; exit 1; }
      - name: Uninstall cask
        run: brew uninstall --cask "${{ matrix.cask }}"
      - name: Verify uninstallation Trader Workstation
        if: startsWith(matrix.cask, 'trader-workstation')
        run: |
          # Check if the application is still running
          if pgrep -f "Trader Workstation" > /dev/null; then
            echo "Trader Workstation is still running after uninstallation."
            exit 1
          fi
      - name: Verify uninstallation IBKR Desktop
        if: startsWith(matrix.cask, 'ibkr-desktop')
        run: |
          # Check if the application is still running
          if pgrep -f "IBKR" > /dev/null; then
            echo "IBKR Desktop is still running after uninstallation."
            exit 1
          fi

  ci-status:
    name: CI Status
    if: always()
    needs:
      - detect_casks
      - audit_casks
      - test_casks
    runs-on: ubuntu-24.04
    steps:
      - name: Set final CI status
        run: |
          if [[ "${{ needs.detect_casks.outputs.casks }}" == "[]" || "${{ needs.detect_casks.outputs.casks }}" == "" ]]; then
            echo "No casks to test. Passing job."
            exit 0
          fi

          if [[ "${{ needs.audit_casks.result }}" == "success" && "${{ needs.test_casks.result }}" == "success" ]]; then
            echo "All tests passed."
            exit 0
          fi

          echo "Some tests failed."
          exit 1
